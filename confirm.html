<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>注文確認</title>
<style>
body{
  font-family: sans-serif;
  padding: 20px;
  background:#fff7f8;
  color:#333;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  font-size:16px;
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.price{
  font-weight:bold;
  font-size:18px;
  margin-top:5px;
  color:#7ca68d;
}

.small{
  font-size:14px;
  color:#666;
}
</style>  
</head>
<body>

<h1>注文内容の確認</h1>

<div id="order"></div>

<h3>受け取り時間</h3>
<p id="time"></p>

<h3>合計</h3>
<p id="total"></p>

<script>

const params = new URLSearchParams(window.location.search);

const data = JSON.parse(decodeURIComponent(params.get("data") || "[]"));
const time = params.get("time");
const safeTime = time || "未選択";
document.getElementById("time").innerText = safeTime;

// 表示
const orderHTML = data.map(item => {
  return `
    <div class="card">
      <div>${item.name}</div>
      <div class="small">数量：${item.count}</div>
      <div class="price">¥${item.price * item.count}</div>
    </div>
  `;
}).join("");

document.getElementById("order").innerHTML = orderHTML;

// 受け取り時間
document.getElementById("time").innerText = time;

// 合計金額計算
let totalPrice = 0;

data.forEach(item => {
  totalPrice += item.price * item.count;
});

document.getElementById("total").innerText =
  "¥" + totalPrice.toLocaleString();

</script>
</body>
</html>
