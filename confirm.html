<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>注文確認</title>
<style>
body{
  font-family: sans-serif;
  padding: 20px;
  background:#fff7f8;
  color:#333;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  font-size:16px;
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.price{
  font-weight:bold;
  font-size:18px;
  margin-top:5px;
  color:#7ca68d;
}

.small{
  font-size:14px;
  color:#666;
}
</style>  
</head>
<body>

<h1>注文内容の確認</h1>

<div id="order"></div>

<h3>受け取り時間</h3>
<p id="time"></p>

<h3>合計</h3>
<p id="total"></p>

<script>

const params = new URLSearchParams(window.location.search);

const data = JSON.parse(decodeURIComponent(params.get("data") || "[]"));
const time = params.get("time");

// 注文表示
document.getElementById("order").innerHTML =
  data.map(item => {

    let detailHTML = "";

    if(item.detail){
      detailHTML = item.detail.map(d =>
        `<div class="small">・${d.name} × ${d.count}</div>`
      ).join("");
    }

    return `
      <div class="card">
        <div>${item.name}</div>
        <div class="small">数量：${item.count}</div>
        ${detailHTML}
        <div class="price">¥${item.price * item.count}</div>
      </div>
    `;
  }).join("");

// 受け取り時間
document.getElementById("time").innerText = time || "未選択";

// 合計金額（税抜→税込）
let totalPrice = 0;

data.forEach(item => {
  totalPrice += item.price * item.count;
});

const taxRate = 0.08;
const totalWithTax = Math.round(totalPrice * (1 + taxRate));

document.getElementById("total").innerText =
  "¥" + totalWithTax.toLocaleString();

</script>
</body>
</html>
