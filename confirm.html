<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>注文確認</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>  
<style>
body{
  font-family: sans-serif;
  padding: 20px;
  background:#fff7f8;
  color:#333;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  font-size:16px;
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.price{
  font-weight:bold;
  font-size:18px;
  margin-top:5px;
  color:#7ca68d;
}

.small{
  font-size:14px;
  color:#666;
}
.backBtn{
  width:100%;
  padding:15px;
  margin-top:20px;
  border:2px solid #9fc9b0;
  border-radius:12px;
  background:white;
  color:#7ca68d;
  font-size:16px;
  font-weight:bold;
}
.submitBtn{
  width:100%;
  padding:18px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#7ca68d;
  color:white;
  font-size:18px;
  font-weight:bold;
  font-weight:bold;
}

.submitBtn:disabled{
  background:#ccc;
  color:#888;
}
 .policyCard{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.policyText{
  font-size:14px;
  line-height:1.8;
}

.agreeArea{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}

.agreeArea input[type="checkbox"]{
  transform: scale(2.2);
  margin-right:15px;
}
.agreeLabel{
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
}  
  
</style>  
</head>
<body>

<h1>注文内容の確認</h1>

<div class="card">
  <h3>注文番号</h3>
  <p id="orderId"></p>
</div>

<div id="order"></div>
<div class="card">
  <h3>お客様情報</h3>

  <p id="customerInfo"></p>
</div>  
<div class="card">
  <h3>受け取り日</h3>
  <p id="pickupDateText"></p>
</div>
<div class="card">
  <h3>受け取り時間</h3>
  <p id="time"></p>
</div>

<div class="card">
  <h3>合計</h3>
  <p id="total"></p>
</div>

<script>
async function initializeLiff() {
  await liff.init({
    liffId: "2001008395-7xwJ1RIM"
  });
}

initializeLiff();  

const params =
  new URLSearchParams(window.location.search);

const customerName =
  params.get("name") || "";

const customerPhone =
  params.get("phone") || "";

const note =
  params.get("note") || "";
const data = JSON.parse(
  decodeURIComponent(params.get("data") || "[]")
);
const pickupDate =
  params.get("date") || "";
const time = params.get("time");

const orderId =
  "NYA" + Date.now().toString().slice(-6);

// 注文表示
document.getElementById("order").innerHTML =
  data.map(item => {

    let detailHTML = "";

    if(item.detail){
      detailHTML = item.detail.map(d =>
        `<div class="small">・${d.name} × ${d.count}</div>`
      ).join("");
    }

    return `
      <div class="card">
        <div>${item.name}</div>
        <div class="small">数量：${item.count}</div>
        ${detailHTML}
        <div class="price">¥${item.price * item.count}</div>
      </div>
    `;
  }).join("");
// 受け取り日
document.getElementById("pickupDateText").innerText =
  pickupDate || "未選択";
  
// 受け取り時間
document.getElementById("time").innerText =
  time || "未選択";

// 注文番号
document.getElementById("orderId").innerText =
  orderId;

// 合計計算
let totalPrice = 0;

data.forEach(item => {
  totalPrice += item.price * item.count;
});

const taxRate = 0.08;

const totalWithTax =
  Math.round(totalPrice * (1 + taxRate));

document.getElementById("total").innerHTML =
  `
  税抜：¥${totalPrice.toLocaleString()}<br>
  税込：¥${totalWithTax.toLocaleString()}
  `;

// 注文送信
async function submitOrder() {

  try {
const button =
  document.getElementById("submitBtn");

button.disabled = true;

button.innerText = "送信中...";
const sendData = {
  orderNumber: orderId,
  pickupDate,
  pickupTime: time,
  items: data.map(item => ({
    ...item,
    setContents: item.detail
      ? item.detail.map(d => `${d.name}×${d.count}`).join(" / ")
      : ""
  })),
  totalPrice: Number(totalWithTax),
  customerName,
  customerPhone
};
    await fetch(
      "https://script.google.com/macros/s/AKfycbyAc8TEQzMwrDfNgXhNjG-ravJK9EqbB00GflnXLVP-rHqtiScsju1YTH3D39LosevX/exec",
      {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(sendData)
      }
    );

    location.href =
  `thanks.html?orderId=${orderId}&time=${time}`;

  } catch(error){

    alert("エラー：" + error);

  }

}
document.getElementById("customerInfo").innerHTML =
  `
  お名前：${customerName}<br>
  電話番号：${customerPhone}<br>
  備考：${note || "なし"}
  `;
  
</script>
<button onclick="history.back()" class="backBtn">
  注文画面に戻る
</button>
<div class="policyCard">

  <h3>キャンセルポリシー</h3>


<div class="policyText">
  ・キャンセルされる場合は、お早めにご連絡をお願いいたします。<br><br>

  ・受取時間の30分前まで：キャンセル料なし<br>
  ・受取時間の30分前以降：商品代金の100％<br><br>

  ・食品ロス削減のためご理解とご協力をお願いいたします。
</div>

  <div class="agreeArea">
   <label class="agreeLabel">
  <input
    type="checkbox"
    id="agreeCheck"
  >
  キャンセルポリシーに同意します
</label>
  </div>

</div>  

<button
  id="submitBtn"
  class="submitBtn"
  onclick="submitOrder()"
  disabled
>
  注文を確定する
</button>
<script>
const agreeCheck =
  document.getElementById("agreeCheck");

const submitBtn =
  document.getElementById("submitBtn");

agreeCheck.addEventListener("change", () => {

  submitBtn.disabled =
    !agreeCheck.checked;

});
</script>
</body>
</html>
