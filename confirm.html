<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>注文確認</title>
<style>
body{
  font-family: sans-serif;
  padding: 20px;
  background:#fff7f8;
  color:#333;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  font-size:16px;
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.price{
  font-weight:bold;
  font-size:18px;
  margin-top:5px;
  color:#7ca68d;
}

.small{
  font-size:14px;
  color:#666;
}
.backBtn{
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  background:#ccc;
  color:white;
  font-size:16px;
}  
.submitBtn{
  width:100%;
  padding:18px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#9fc9b0;
  color:white;
  font-size:18px;
  font-weight:bold;
}  
</style>  
</head>
<body>

<h1>注文内容の確認</h1>

<div class="card">
  <h3>注文番号</h3>
  <p id="orderId"></p>
</div>

<div id="order"></div>

<div class="card">
  <h3>受け取り時間</h3>
  <p id="time"></p>
</div>

<div class="card">
  <h3>合計</h3>
  <p id="total"></p>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const data = JSON.parse(
  decodeURIComponent(params.get("data") || "[]")
);

const time = params.get("time");

const orderId =
  "NYA" + Date.now().toString().slice(-6);

// 注文表示
document.getElementById("order").innerHTML =
  data.map(item => {

    let detailHTML = "";

    if(item.detail){
      detailHTML = item.detail.map(d =>
        `<div class="small">・${d.name} × ${d.count}</div>`
      ).join("");
    }

    return `
      <div class="card">
        <div>${item.name}</div>
        <div class="small">数量：${item.count}</div>
        ${detailHTML}
        <div class="price">¥${item.price * item.count}</div>
      </div>
    `;
  }).join("");

// 受け取り時間
document.getElementById("time").innerText =
  time || "未選択";

// 注文番号
document.getElementById("orderId").innerText =
  orderId;

// 合計計算
let totalPrice = 0;

data.forEach(item => {
  totalPrice += item.price * item.count;
});

const taxRate = 0.08;

const totalWithTax =
  Math.round(totalPrice * (1 + taxRate));

document.getElementById("total").innerHTML =
  `
  税抜：¥${totalPrice.toLocaleString()}<br>
  税込：¥${totalWithTax.toLocaleString()}
  `;

// 注文送信
async function submitOrder() {

  try {
const button =
  document.getElementById("submitBtn");

button.disabled = true;

button.innerText = "送信中...";
    const sendData = {
      orderId,
      time,
      items: data
    };

    await fetch(
      "https://script.google.com/macros/s/AKfycbyoZkBzwfHfYa0GAJm6VEZf1yfo2Uppu-oOV4fPMy0TmPIfe7q1s0bK48hv3qYvb3yH/exec",
      {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(sendData)
      }
    );

    location.href =
  `thanks.html?orderId=${orderId}&time=${time}`;

  } catch(error){

    alert("エラー：" + error);

  }

}

</script>
<button onclick="history.back()" class="backBtn">
  注文画面に戻る
</button>

<button
  id="submitBtn"
  class="submitBtn"
  onclick="submitOrder()"
>
  注文を確定する
</button>
</body>
</html>
